name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  validate:
    name: Validate static app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required deploy assets
        run: |
          test -f index.html
          test -f js/app.js
          test -f js/audio-engine.js
          test -f js/nothing-ui.js
          test -f css/nothing-ui.css
          test -f css/app.css
          test -f css/tokens.css
          test -f vercel.json
          test -f fonts/open/Doto-ROND-wght.ttf
          test -f fonts/open/Geist-Regular.ttf
          echo "All static assets present."

      - name: Verify HTML references resolve
        run: |
          grep -q 'css/nothing-ui.css' index.html
          grep -q 'css/app.css' index.html
          grep -q 'js/nothing-ui.js' index.html
          grep -q 'js/app.js' index.html
          echo "Asset references OK."

  deploy-preview:
    name: Preview deploy
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@50.18.2

      - name: Pull Vercel settings
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - id: deploy
        name: Deploy preview
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $url"

  deploy-production:
    name: Production deploy
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@50.18.2

      - name: Pull Vercel settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - id: deploy
        name: Deploy production
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Production URL: $url"
