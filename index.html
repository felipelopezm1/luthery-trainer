<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrenador Musical · BELE Laudería</title>
  <link rel="stylesheet" href="css/nothing-ui.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="i-chev-r" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></symbol>
  <symbol id="i-chev-l" viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></symbol>
  <symbol id="i-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></symbol>
  <symbol id="i-music" viewBox="0 0 24 24"><path d="M9 18V6l10-2v12"/><circle cx="6.5" cy="18" r="2.5"/><circle cx="16.5" cy="16" r="2.5"/></symbol>
  <symbol id="i-grid" viewBox="0 0 24 24"><rect x="4" y="4" width="6" height="6" rx="1"/><rect x="14" y="4" width="6" height="6" rx="1"/><rect x="4" y="14" width="6" height="6" rx="1"/><rect x="14" y="14" width="6" height="6" rx="1"/></symbol>
  <symbol id="i-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/></symbol>
  <symbol id="i-chart" viewBox="0 0 24 24"><path d="M4 19V5M4 19h16M8 17V11M12 17V7M16 17v-4"/></symbol>
  <symbol id="i-book" viewBox="0 0 24 24"><path d="M4 19V5a2 2 0 0 1 2-2h12v16H6a2 2 0 0 0-2 2z"/><path d="M6 3v16"/></symbol>
  <symbol id="i-ear" viewBox="0 0 24 24"><path d="M6 8a6 6 0 1 1 12 0c0 4 2 5 2 5H4s2-1 2-5"/><path d="M10 12a2 2 0 0 0 4 0"/></symbol>
  <symbol id="i-note" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></symbol>
</defs></svg>

<div class="app-shell" data-theme="dark">
  <header class="app-header">
    <div class="brand-block">
      <div class="brand-mark">ENTRENADOR · BELE</div>
      <div class="brand-sub">Prueba sustitutoria · 4º EE</div>
    </div>
    <div class="grow"></div>
    <div class="score-strip" id="score-strip">
      <span class="score-pill">Lect.<b id="sc-lect">0/0</b></span>
      <span class="score-pill">Ac.<b id="sc-ac">0/0</b></span>
      <span class="score-pill">Rit.<b id="sc-rt">0/0</b></span>
      <span class="score-pill">Err.<b id="sc-err">0/0</b></span>
      <span class="score-pill">Teo.<b id="sc-teo">0/0</b></span>
    </div>
    <div class="fab" role="group" aria-label="Tema">
      <button type="button" data-theme-set="dark" aria-pressed="true">DARK</button>
      <button type="button" data-theme-set="light" aria-pressed="false">LIGHT</button>
    </div>
  </header>

  <div class="appscreen trainer mod s12" style="border-radius:0;border:0;padding:0;background:transparent">
    <nav class="rail" id="main-nav" aria-label="Secciones">
      <button type="button" class="r-i on" data-mod="inicio" title="Examen" aria-label="Examen">
        <svg class="ico sm"><use href="#i-book"/></svg>
      </button>
      <button type="button" class="r-i" data-mod="ritmo" title="Ritmo a.1" aria-label="Lectura rítmica">
        <svg class="ico sm"><use href="#i-clock"/></svg>
      </button>
      <button type="button" class="r-i" data-mod="errores" title="Errores b.1" aria-label="Errores melódicos">
        <svg class="ico sm"><use href="#i-ear"/></svg>
      </button>
      <button type="button" class="r-i" data-mod="acordes" title="Acordes b.2" aria-label="Test de acordes">
        <svg class="ico sm"><use href="#i-music"/></svg>
      </button>
      <button type="button" class="r-i" data-mod="lectura" title="Clave de Sol" aria-label="Lectura en clave de Sol">
        <svg class="ico sm"><use href="#i-note"/></svg>
      </button>
      <button type="button" class="r-i" data-mod="teoria" title="Teoría" aria-label="Cuestionario de teoría">
        <svg class="ico sm"><use href="#i-grid"/></svg>
      </button>
      <span class="sp"></span>
      <button type="button" class="r-i" data-mod="historial" title="Progreso" aria-label="Historial y progreso">
        <svg class="ico sm"><use href="#i-chart"/></svg>
      </button>
    </nav>

    <main class="main" id="app-main">
      <div class="content-split">
        <div class="page-stage" id="page-stage"></div>
        <aside class="viz-panel" id="viz-panel" aria-label="Audio y visualización">
          <div class="viz-head">
            <span class="label">Instrumento</span>
            <span class="viz-hint">SF2 · compatible con <a href="https://github.com/davy7125/polyphone" target="_blank" rel="noopener">Polyphone</a></span>
          </div>
          <div class="instr-tabs" id="instr-tabs"></div>
          <div class="viz-canvas-wrap">
            <canvas id="viz-wave" class="viz-canvas" aria-label="Forma de onda"></canvas>
            <canvas id="viz-spec" class="viz-canvas viz-spec" aria-label="Espectro"></canvas>
          </div>
          <div class="viz-keyboard" id="viz-keyboard" aria-label="Teclado MIDI"></div>
          <div class="midi-block">
            <div class="midi-row">
              <button type="button" class="btn btn-outline btn-sq" id="midi-connect" title="Conectar LPK25">MIDI</button>
              <select class="inp midi-select" id="midi-select" aria-label="Dispositivo MIDI"><option>—</option></select>
            </div>
            <p class="midi-status" id="midi-status">Conecta tu AKAI LPK25</p>
          </div>
          <div class="compare-block">
            <span class="label">Comparación en vivo</span>
            <div class="compare-row"><span>Objetivo</span><b id="compare-target">—</b></div>
            <div class="compare-row"><span>Tu nota</span><b id="compare-user">—</b></div>
            <p class="compare-result" id="compare-result">Toca el teclado para comparar con el ejercicio</p>
          </div>
        </aside>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
<script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
<script src="js/audio-engine.js"></script>
<script src="js/nothing-ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
